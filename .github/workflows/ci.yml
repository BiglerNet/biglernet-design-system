name: Build and test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint DESIGN.md
        run: npm run design:lint

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          test -f dist/tokens/light.css || (echo "Missing dist/tokens/light.css" && exit 1)
          test -f dist/tokens/dark.css  || (echo "Missing dist/tokens/dark.css"  && exit 1)
          test -f dist/components/components.css || (echo "Missing dist/components/components.css" && exit 1)
          echo "All required files present"

      - name: Pack dry-run
        run: npm pack --dry-run
